name: gait_detector
description: GaitDetector - 步态检测应用，通过BLE传感器采集步态数据。

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE蓝牙通信
  flutter_blue_plus: ^1.30.0

  # 权限管理
  permission_handler: ^11.0.0

  # 状态管理
  provider: ^6.0.5

  # 文件路径
  path_provider: ^2.1.1

  # 文件分享
  share_plus: ^7.2.2

  # 国际化和日期格式
  intl: ^0.19.0

  # UI组件
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 如需要自定义字体，可在此添加
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700
